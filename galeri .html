<!DOCTYPE html>

    <title>Galeri - Shoes Shop</title>

    <style>

        body{
            margin:0;
            font-family:Arial;
            background:#f4f4f4;
        }

        header{
            background:
            linear-gradient(rgba(0,0,0,0.5),rgba(0,0,0,0.5)),
            url("sepatu.jpg");
            background-size:cover;
            background-position:center;
            color:white;
            text-align:center;
            padding:90px 30px;
        }

        header h1{
            font-size:50px;
            margin-bottom:10px;
        }

        header p{
            font-size:22px;
        }

        .menu{
            background:#222;
            text-align:center;
            padding:15px;
        }

        .menu a{
            color:white;
            text-decoration:none;
            padding:15px 25px;
        }

        .menu a:hover{
            background:#ff6600;
            border-radius:5px;
        }

        .container{
            width:90%;
            margin:auto;
            padding:30px;
        }

        h2{
            text-align:center;
            color:#ff6600;
            margin-bottom:30px;
        }

        .gallery{
            display:flex;
            flex-wrap:wrap;
            justify-content:center;
            gap:25px;
        }

        .card{
            background:white;
            padding:15px;
            border-radius:10px;
            box-shadow:0 0 15px rgba(0,0,0,0.15);
            text-align:center;
            transition:0.3s;
        }

        .card:hover{
            transform:translateY(-8px);
        }

        .gallery img{
            width:300px;
            height:200px;
            border-radius:10px;
        }

        .card h3{
            color:#ff6600;
            margin:15px 0 10px;
        }

        .card p{
            color:#555;
        }

        footer{
            background:#222;
            color:white;
            text-align:center;
            padding:20px;
            margin-top:30px;
        }

    </style>

</head>
