<!DOCTYPE html>

    <style>

        body{
            margin:0;
            font-family:Arial, sans-serif;
            background:#f4f4f4;
        }

        header{
            background:
            linear-gradient(rgba(0,0,0,.5),rgba(0,0,0,.5)),
            url("sepatu.jpg");
            background-size:cover;
            background-position:center;
            color:white;
            text-align:center;

        }

        .menu a{
            color:white;
            text-decoration:none;

        }

        .menu a:hover{
            background:#ff6600;
            border-radius:5px;
        }

        .container{
            width:80%;
            margin:auto;
            background:white;
            margin-top:30px;
            margin-bottom:30px;
            padding:30px;
            border-radius:10px;

        }

        h2{
            color:#ff6600;
            border-bottom:2px solid #ff6600;
            padding-bottom:10px;
        }

        table{
            width:100%;
            margin-bottom:30px;
            border-collapse:collapse;
        }

        td{
            padding:12px;
            border-bottom:1px solid #ddd;
        }

        input,textarea{
            width:100%;
            padding:12px;
            border:1px solid #ccc;
            border-radius:5px;
            box-sizing:border-box;
            font-size:15px;
        }

        textarea{
            resize:none;
        }

        input[type=submit]{
            background:#ff6600;
            color:white;
            border:none;
            cursor:pointer;
            font-size:16px;
        }

        input[type=submit]:hover{
            background:#e65c00;
        }

        footer{
            background:#222;
            color:white;
            text-align:center;
            padding:20px;
        }

    </style>
